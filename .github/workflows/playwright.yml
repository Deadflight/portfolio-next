name: Playwright Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  E2E:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      EMAIL_SENDER_API_KEY: ${{ secrets.EMAIL_SENDER_API_KEY }}
      EMAIL_SENDER_FROM_EMAIL: ${{ secrets.EMAIL_SENDER_FROM_EMAIL }}
      EMAIL_SENDER_TO_EMAIL: ${{ secrets.EMAIL_SENDER_TO_EMAIL }}
      NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
      CI: ${{ secrets.CI }}
      NODE_ENV: ${{ secrets.NODE_ENV }}
      NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Build the project
        run: npm run build

      - name: Start the project
        run: npm run start &
        continue-on-error: false
      - name: Wait for the server to start
        run: |
          echo "Waiting for the server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Waiting for server to start..."
            sleep 5
          done
          if ! curl -s http://localhost:3000 > /dev/null; then
            echo "Server did not start in time!"
            exit 1
          fi

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers (only Chromium)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
